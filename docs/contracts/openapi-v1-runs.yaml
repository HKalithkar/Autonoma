openapi: 3.0.3
info:
  title: Autonoma Runs API
  version: 1.0.0
paths:
  /v1/runs:
    post:
      summary: Create a run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [intent, environment]
              additionalProperties: false
              properties:
                intent:
                  type: string
                  minLength: 1
                environment:
                  type: string
                  enum: [dev, stage, prod]
                metadata:
                  type: object
      responses:
        "202":
          description: Accepted
  /v1/runs/{run_id}:
    get:
      summary: Get run
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run summary
  /v1/runs/{run_id}/timeline:
    get:
      summary: Get run timeline
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
        - in: query
          name: after_event_id
          required: false
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: Timeline events
  /v1/runs/{run_id}/stream:
    get:
      summary: Stream run timeline via SSE
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
        - in: header
          name: Last-Event-ID
          required: false
          schema:
            type: string
        - in: query
          name: last_event_id
          required: false
          schema:
            type: string
        - in: query
          name: follow_seconds
          required: false
          schema:
            type: number
            minimum: 0
            maximum: 30
        - in: query
          name: poll_interval_seconds
          required: false
          schema:
            type: number
            minimum: 0.05
            maximum: 2
      responses:
        "200":
          description: Text event stream
  /v1/runs/{run_id}/approve:
    post:
      summary: Approve run
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approval applied
  /v1/runs/{run_id}/reject:
    post:
      summary: Reject run
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rejection applied
  /v1/internal/policy/step-evaluate:
    post:
      summary: Internal policy gate for step execution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [run_id, step_id, action, correlation_id, actor_id, tenant_id]
              additionalProperties: false
              properties:
                run_id:
                  type: string
                  minLength: 1
                step_id:
                  type: string
                  minLength: 1
                action:
                  type: string
                  minLength: 1
                retry_count:
                  type: integer
                  minimum: 0
                risk_score:
                  type: number
                  minimum: 0
                  maximum: 1
                requires_human_approval:
                  type: boolean
                correlation_id:
                  type: string
                  minLength: 1
                actor_id:
                  type: string
                  minLength: 1
                tenant_id:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: Decision artifact
        "401":
          description: Invalid token
