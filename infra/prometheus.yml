global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
  - job_name: "otel-collector-telemetry"
    static_configs:
      - targets: ["otel-collector:8888"]
  - job_name: "api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
  - job_name: "agent-runtime"
    metrics_path: /metrics
    static_configs:
      - targets: ["agent-runtime:8001"]
  - job_name: "plugin-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["plugin-gateway:8002"]
