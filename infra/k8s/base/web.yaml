apiVersion: apps/v1
kind: Deployment
metadata:
  name: autonoma-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autonoma-web
  template:
    metadata:
      labels:
        app: autonoma-web
    spec:
      containers:
        - name: web
          image: autonoma/web:latest
          ports:
            - containerPort: 3000
          env:
            - name: VITE_API_URL
              value: "https://api.autonoma.local"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  selector:
    app: autonoma-web
  ports:
    - port: 3000
      targetPort: 3000
