apiVersion: apps/v1
kind: Deployment
metadata:
  name: autonoma-plugin-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autonoma-plugin-gateway
  template:
    metadata:
      labels:
        app: autonoma-plugin-gateway
    spec:
      containers:
        - name: plugin-gateway
          image: autonoma/plugin-gateway:latest
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: autonoma-config
            - secretRef:
                name: autonoma-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: plugin-gateway
spec:
  selector:
    app: autonoma-plugin-gateway
  ports:
    - port: 8002
      targetPort: 8002
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: autonoma-plugin-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: autonoma-plugin-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
