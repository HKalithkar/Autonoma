apiVersion: apps/v1
kind: Deployment
metadata:
  name: autonoma-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autonoma-api
  template:
    metadata:
      labels:
        app: autonoma-api
    spec:
      containers:
        - name: api
          image: autonoma/api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: autonoma-config
            - secretRef:
                name: autonoma-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: autonoma-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: autonoma-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: autonoma-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
