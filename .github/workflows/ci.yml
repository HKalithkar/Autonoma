name: ci

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv venv .venv
          uv pip install -r requirements-dev.txt
      - name: Lint Python
        run: uv run --python .venv/bin/python ruff check .
      - name: Type check
        run: uv run --python .venv/bin/python mypy apps
      - name: Test Python
        run: uv run --python .venv/bin/python pytest
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install web deps
        working-directory: apps/web
        run: npm install
      - name: Lint web
        working-directory: apps/web
        run: npm run lint
      - name: Test web
        working-directory: apps/web
        run: npm run test
      - name: Policy tests
        run: make policy-test

  security:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv venv .venv
          uv pip install pip-audit
      - name: Dependency scan (Python)
        run: uv run --python .venv/bin/python pip-audit -r requirements.txt --ignore-vuln CVE-2024-23342
      - name: Dependency scan (Node)
        working-directory: apps/web
        run: npm audit --audit-level=high
